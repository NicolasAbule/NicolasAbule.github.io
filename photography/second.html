<!DOCTYPE html>
<html>
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="../icon.PNG">
    <title>Nicolas Abule</title>

</head>

<div id="image-container" style="background-color: lightblue;" class="gallery">
    </div>

<script>
    // --- SETTINGS ---
    const username = 'NicolasAbule';
    const repo = 'NicolasAbule.github.io';
    const folderPath = 'images'; // The folder where your images live

    const container = document.getElementById('image-container');
    const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`;

    async function loadImages() {
        try {
            const response = await fetch(apiUrl);
            const files = await response.json();

            // Filter to make sure we only grab image files
            const extensions = ['.jpg', '.jpeg', '.png', '.webp', '.gif', '.svg'];
            
            files.forEach(file => {
                const isImage = extensions.some(ext => file.name.toLowerCase().endsWith(ext));
                
                if (isImage) {
                    const img = document.createElement('img');
                    // Use download_url to get the raw image link
                    img.src = file.download_url;
                    img.alt = file.name;
                    img.style.width = "max(400px, 48vw)"; // Applied via JS for consistency
                    container.appendChild(img);
                }
            });
        } catch (error) {
            console.error("Error fetching images from GitHub API:", error);
            container.innerHTML = "<p>Failed to load images. Check your Repo settings.</p>";
        }
    }

    loadImages();
</script>
